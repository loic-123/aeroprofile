<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons. SVG serves every modern browser at any resolution; the
         ICO is the legacy fallback and the apple-touch-icon covers iOS
         add-to-home-screen + Android Chrome add-to-desktop. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <title>AeroProfile — Estimate your cycling CdA from any ride</title>
    <meta name="description" content="Open-source tool that estimates your aerodynamic drag (CdA) and rolling resistance (Crr) from a regular ride. Wind-inverse solver, hierarchical multi-ride meta-analysis, calibrated uncertainty. Free, no account needed." />
    <meta name="author" content="Loïc Briand" />
    <meta name="keywords" content="CdA, Crr, aerodynamic drag, cycling, power meter, FIT file, virtual elevation, Chung method, wind tunnel alternative, Intervals.icu" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord...) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AeroProfile — Estimate your cycling CdA from any ride" />
    <meta property="og:description" content="Open-source CdA estimator with wind-inverse solver, hierarchical meta-analysis, and calibrated uncertainty. No velodrome. No protocol. Just upload a FIT file." />
    <meta property="og:url" content="https://aeroprofile.cc" />
    <meta property="og:site_name" content="AeroProfile" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:image" content="https://aeroprofile.cc/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AeroProfile hero card: CdA = 0.284 m² with IC95 [0.271–0.297], stability timeline showing CdA trend over 10 rides, wind-inverse + hierarchical DL + open-source badges" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AeroProfile — Estimate your cycling CdA from any ride" />
    <meta name="twitter:description" content="Open-source CdA estimator with wind-inverse solver, hierarchical meta-analysis, and calibrated uncertainty. Free. No account needed." />
    <meta name="twitter:image" content="https://aeroprofile.cc/og-image.jpg" />
    <meta name="twitter:image:alt" content="AeroProfile dashboard screenshot" />

    <!-- Canonical + theme -->
    <link rel="canonical" href="https://aeroprofile.cc" />
    <meta name="theme-color" content="#0b0a08" />
    <meta name="color-scheme" content="dark light" />
  </head>
  <body class="bg-bg text-text font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
