services:
  - type: web
    name: aeroprofile
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -e .
      cd frontend && npm install && npm run build
    startCommand: uvicorn aeroprofile.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: NODE_VERSION
        value: 20.11.0
      - key: AEROPROFILE_MAX_TILES
        value: "3"
      - key: AEROPROFILE_TILE_KM
        value: "15"
